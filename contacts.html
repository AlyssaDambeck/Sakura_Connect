<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sakura Connect Contacts</title>

    <link rel="stylesheet" href="css/contacts.css">
    <script src="js/contacts.js"></script>
</head>


<body>

<div class="petals">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>

<div class="sidebar">

    <div class="logo-section">
        <div class="logo">&#127800;</div>
        <h2>Sakura Connect</h2>
    </div>

    <div class="user-info">

        <div class="welcome-text">
            Welcome Back
        </div>

        <div
            class="user-name"
            id="userName">
        </div>

    </div>

    <button onclick="searchContact()">
        Search
    </button>

    <button onclick="addContact()">
        Add Contact
    </button>

    <button onclick="location.href='members.html'">
        Members
    </button>

    <button onclick="doLogout()">
        Logout
    </button>

</div>

<div class="main-content">

    <div class="top-bar">

        <input
            id="searchText"
            type="text"
            placeholder="Search Contacts">

    </div>

    <div id="emptyState" class="empty-state" style="display:none;">
        <h2>No Contacts Yet</h2>
        <p>Click "Add Contact" to create your first contact.</p>
    </div>

    <div 
        class="contacts-grid"
        id="contactsGrid">

    </div>

</div>

</body>
</html>
